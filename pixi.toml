# This is a Pixi configuration file optionally used for development.
#
# Pixi automatically manages Conda environment (in .pixi folder) and series
# of tasks to run in these environment.
# The most relevant task is `test`, that can be run directly.
# Because we created multiple environments for different compilers, it is easier to specify
# it as a command line argument.
#
#     pixi run -e clang-21 test
#
# We can also combine it with CMake presets to target a particular architecture, which is
# convenient to test less powerful architecture that one's computer.
#
#     pixi run -e clang-21 test dev-sse2
#
# The file is also useful for running development scripts, such as formatting the codebase:
#
#     pixi run fmt
#
# All documentation, including installation instructions can be found in at
# https://pixi.sh


[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-arm64", "osx-64"]

# Basic build tools to include in any compiler environment
[feature.build-tools.dependencies]
cmake = ">=3.16"
ninja = "*"
sccache = "*"
[feature.build-tools.target.linux.dependencies]
binutils = "*"
[feature.build-tools.target.osx.dependencies]
cctools = ">=949.0.1"
ld64 = ">=530"
llvm-openmp = "*"

# Libraries needed by the project
[feature.lib.dependencies]
xtl = "*"
doctest = "*"

# Mostly to fix the CI
[environments.default]
features = ["lib"]

# A set of clang dependencies that include a set of unconstrained needed packages.
# We combine it with another feature to pin an exact version.
[feature.clang-base.dependencies]
clang = "*"
clangxx = "*"
[feature.clang-base.activation.env]
CC = "$CONDA_PREFIX/bin/clang"
CFLAGS = "-isystem $CONDA_PREFIX/include"
CXX = "$CONDA_PREFIX/bin/clang++"
CXXFLAGS = "-isystem $CONDA_PREFIX/include"
LDFLAGS = "-Wl,-rpath,$CONDA_PREFIX/lib -L$CONDA_PREFIX/lib"

# clang-17 compiler environment
[feature.clang-17.dependencies]
clang = "17.*"
[environments.clang-17]
features = ["cmd", "build-tools", "lib", "clang-base", "clang-17"]

# clang-18 compiler environment
[feature.clang-18.dependencies]
clang = "18.*"
[environments.clang-18]
features = ["cmd", "build-tools", "lib", "clang-base", "clang-18"]

# clang-19 compiler environment
[feature.clang-19.dependencies]
clang = "19.*"
[environments.clang-19]
features = ["cmd", "build-tools", "lib", "clang-base", "clang-19"]

# clang-20 compiler environment
[feature.clang-20.dependencies]
clang = "20.*"
[environments.clang-20]
features = ["cmd", "build-tools", "lib", "clang-base", "clang-20"]

# clang-21 compiler environment
[feature.clang-21.dependencies]
clang = "21.*"
[environments.clang-21]
features = ["cmd", "build-tools", "lib", "clang-base", "clang-21"]

# clang-22 compiler environment
[feature.clang-22.dependencies]
clang = "22.*"
[environments.clang-22]
features = ["cmd", "build-tools", "lib", "clang-base", "clang-22"]

# A set of gcc dependencies that include a set of unconstrained needed packages.
# We combine it with another feature to pin an exact version.
[feature.gcc-base.target.linux.dependencies]
gcc = "*"
gxx = "*"
[feature.gcc-base.activation.env]
CC = "$CONDA_PREFIX/bin/gcc"
CFLAGS = "-isystem $CONDA_PREFIX/include"
CXX = "$CONDA_PREFIX/bin/g++"
CXXFLAGS = "-isystem $CONDA_PREFIX/include"
LDFLAGS = "-Wl,-rpath,$CONDA_PREFIX/lib -L$CONDA_PREFIX/lib"

# gcc-13 compiler environment
[feature.gcc-13.target.linux.dependencies]
gcc = "13.*"
[environments.gcc-13]
features = ["cmd", "build-tools", "lib", "gcc-base", "gcc-13"]

# gcc-14 compiler environment
[feature.gcc-14.target.linux.dependencies]
gcc = "14.*"
[environments.gcc-14]
features = ["cmd", "build-tools", "lib", "gcc-base", "gcc-14"]

# gcc-15 compiler environment
[feature.gcc-15.target.linux.dependencies]
gcc = "15.*"
[environments.gcc-15]
features = ["cmd", "build-tools", "lib", "gcc-base", "gcc-15"]

# A feature to group a set of build and test tasks that can be included in multiple environment
[feature.cmd.tasks.configure]
args = [{ arg = "preset", default = "dev-native" }]
cmd = """
mkdir -p build/{{ pixi.environment.name }}/ && \
cmake -B build/{{ pixi.environment.name }}/{{ preset }} -G Ninja \
  --preset {{ preset }} \
  -D CMAKE_COLOR_DIAGNOSTICS=ON \
  -D CMAKE_C_COMPILER_LAUNCHER="sccache" \
  -D CMAKE_CXX_COMPILER_LAUNCHER=sccache \
  -D CMAKE_EXPORT_COMPILE_COMMANDS=ON
"""
inputs = ["**/CMakeLists.txt", "**/*.cmake.in", "cmake/"]
outputs = ["build/{{ pixi.environment.name }}/{{ preset }}/CMakeCache.txt"]
description = """
Run the CMake configuration step with a given preset. \
Build folders are stored in `build/` subdirectories.\
"""

[feature.cmd.tasks.build]
args = [{ arg = "preset", default = "dev-native" }]
cmd = "cmake --build build/{{ pixi.environment.name }}/{{ preset }} --parallel"
depends-on = [{ task = "configure", args = ["{{ preset }}"] }]
# No caching configured here since CMake will do it better
description = """
Run the compilation steps in parallel via CMake. \
CMake will detect files that have changed and need rebuilding.\
"""

[feature.cmd.tasks.test]
args = [{ arg = "preset", default = "dev-native" }]
cmd = "./build/{{ pixi.environment.name }}/{{ preset }}/test/test_xsimd"
depends-on = [{ task = "build", args = ["{{ preset }}"] }]
description = """
Run the test suite for the given preset (launch recompilation as needed). \
The preset can be used to test an older micro architecture on a machine (e.g. \
testing SSE4.2 on a AVX2 machine).\
"""

[feature.cmd.tasks.show-asm]
cmd = "$CXX -S -xc++ -o- - -Iinclude/ -DNDEBUG -O3"
description = """
Show the assembly produced for the current compiler and preset for the \
code passed through the standard input.
"""

# A feature and environment to build documentation
[feature.doc.dependencies]
doxygen = "*"
sphinx = "*"
breathe = "*"
sphinx_rtd_theme = "*"
make = "*"

[feature.doc.tasks.doc]
cmd = "make html"
cwd = "docs/"
description = "Build the HTML documentation"

[environments.doc]
features = ["lib", "doc"]

# A dev feature and environment that contains LSP, formatters etc.
[feature.dev.dependencies]
taplo = "*"
cmake-format = "*"
clang = "18.*"
clangxx = "18.*"
clang-tools = "18.*" # matching clang-format version in CI
lld = "*"
typos-lsp = "*"
neocmakelsp = "*"
[feature.dev.target.linux.dependencies]
gdb = "*"
valgrind = "*"
[feature.dev.target.osx.dependencies]
lldb = "*"

[feature.dev.tasks.fmt-clang]
cmd = "find . -name '*.[ch]pp' | xargs clang-format -i"
inputs = ["**/*.*pp"]
outputs = ["**/*.*pp"]
description = "Run clang-format on the codebase."

[feature.dev.tasks.init-lsp]
cmd = "ln -sf build/dev/dev-native/compile_commands.json"
depends-on = [
  { task = "configure", args = [
    "dev-native",
  ], environment = "dev" },
]
outputs = ["compile_commands.json"]
description = "Initialize the compilation database for clangd."

[feature.dev.tasks.fmt-taplo]
cmd = "taplo fmt"
description = "Format the TOML files."

[feature.dev.tasks]
fmt = { depends-on = ["fmt-clang", "fmt-taplo"] }

[environments.dev]
features = ["build-tools", "lib", "clang-base", "dev", "cmd"]
solve-group = "default"
